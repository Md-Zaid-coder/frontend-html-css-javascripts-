<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .nav2{
    background-color: #03643c;
    width: 200px;
    padding: 20px;
    }
    .nav2 ul{
        list-style-type: none;
        padding: 0;
        margin: 0;
    }
    .nav2 li{
        margin-bottom: 12px;
    }
    .nav2 a{
        text-decoration: none;
        color: #fff;
        display: block;
        padding: 100px;
        width: 100%;
    }
    .nav2 a:hover{
        background-color: #137e0a;
    }
    .nav2.login-btn{
        background-color: greenyellow;
        color: white;
        border: none;
        width: 100%;
        padding: 10px;
        cursor: pointer;
        cursor: pointer;
    }
        .nav2.login-btn:hover{
            background-color: 1a1a1a;
        }
        .nav3 {
            background-color: aqua;
            padding: 10px;
        }
        .nav3 ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 10px;
            justify-content: space-around;
            align-items: center ;
        }
        .nav3 a{
            text-decoration: none;
            color: #000;
            padding: 10px ;
            display: block;
        }
        .nav .dropdown-content {
            display: none;
            
        }
        .nav3 .dropdown:hover .dropdown-content {
            display: block;
            position: absolute;
            background-color: #fff  ;
            min-width: 150px;
        }
</style>
<body>
    <div class="nav-container">
        <h2>Variation 2: Vertical with hover effects</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#" class="nav">Home</a></li>
                <li><a href="#" class="nav">About</a></li>
                <li><a href="#" class="nav">Services</a></li>
                <li><a href="#" class="nav">Contact</a></li>
            </ul>
            <button class="login-btn">Login</button>
        </nav>
    </div>

    <div class="login-btn"></div>
</body>
</html>
